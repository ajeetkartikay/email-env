name: email-response-env
version: "1.0.0"
description: >
  An environment that simulates real-world customer support email triage.
  An agent must read customer emails and respond appropriately.
  Tasks range from simple refund requests to complex multi-issue complaints.

observation_space:
  type: object
  fields:
    email:
      type: string
      description: The customer email the agent must respond to
    step_count:
      type: integer
      description: Number of steps taken in the episode
    task_id:
      type: string
      description: Identifier for the current task

action_space:
  type: object
  fields:
    response:
      type: string
      description: The agent's reply to the customer email

reward:
  type: float
  range: [0.0, 1.0]
  description: >
    Score based on quality of response — apology, solution offered,
    politeness, and issue acknowledgement.

tasks:
  - id: task_1
    name: Simple Refund Request
    difficulty: easy
    description: Customer asking for a refund on a damaged item.

  - id: task_2
    name: Angry Delayed Delivery
    difficulty: medium
    description: Angry customer threatening bad review over delayed delivery.

  - id: task_3
    name: Multi-Issue Complaint
    difficulty: hard
    description: >
      Customer with multiple issues — wrong item, billing error,
      and no support response for 2 weeks.

entry_point: env.environment:EmailEnv
tags:
  - customer-support
  - email
  - nlp
  - openenv