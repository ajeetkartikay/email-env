name: email-response-env
version: "1.0.0"
description: >
  An environment that simulates real-world customer support email triage.

observation_space:
  type: object
  fields:
    email:
      type: string
    step_count:
      type: integer
    task_id:
      type: string

action_space:
  type: object
  fields:
    response:
      type: string

tasks:
  - id: task_1
    name: Simple Refund Request
    difficulty: easy
    grader: env.graders:grade_easy

  - id: task_2
    name: Angry Delayed Delivery
    difficulty: medium
    grader: env.graders:grade_medium

  - id: task_3
    name: Multi-Issue Complaint
    difficulty: hard
    grader: env.graders:grade_hard

entry_point: env.environment:EmailEnv
tags:
  - customer-support
  - email
  - openenv